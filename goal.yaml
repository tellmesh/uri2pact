version: '1.0'
project:
  name: uri2pact
  type: [python]
  description: 'uri2pact — TellMesh URI package'
versioning:
  strategy: semver
  files: [pyproject.toml:version]
git:
  commit:
    strategy: conventional
    scope: uri2pact
  tag:
    enabled: true
    prefix: v
strategies:
  python:
    test: pytest tests/ -q
    build: python -m build
    publish: twine upload dist/uri2pact-{version}*
    publish_enabled: true
registries:
  pypi:
    url: https://pypi.org/simple/
    token_env: PYPI_TOKEN
